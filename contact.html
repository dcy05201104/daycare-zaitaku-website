<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ご相談・お問い合わせ | デイケア西高松在宅</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.jpg" type="image/jpeg">
</head>
<body class="sub-page">

    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">
                    <img src="logo.jpg" alt="デイケア西高松在宅 ロゴ" class="header-logo-img">
                    デイケア <span class="logo-sub">西高松在宅</span>
                </a>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html#features">特徴</a></li>
                    <li><a href="index.html#schedule">時間</a></li>
                    <li><a href="contact.html" class="btn-contact-top">お問い合わせ</a></li>
                </ul>
            </nav>
        </div> 
    </header>

    <main class="container page-content">
        <section class="detail-header">
            <span class="category-tag">CONTACT</span>
            <h1>ご相談・お問い合わせ</h1>
        </section>

        <section class="contact-form-area">
            <p class="lead-text">
                リハビリ内容やご利用に関するご質問など、まずはお気軽にご相談ください。
            </p>

            <form action="https://formspree.io/f/xzdjogja" method="POST" class="contact-form">
                <input type="hidden" name="_next" value="thanks.html">

                <div class="form-group">
                    <label for="name">お名前 <span class="required">必須</span></label>
                    <input type="text" id="name" name="name" placeholder="例：高松 太郎" required>
                </div>

                <div class="form-group">
                    <label for="kana">フリガナ <span class="required">必須</span></label>
                    <input type="text" id="kana" name="kana" placeholder="例：タカマツ タロウ" required>
                </div>

                <div class="form-group">
                    <label for="tel">電話番号 <span class="required">必須</span></label>
                    <input type="tel" id="tel" name="tel" placeholder="例：080-0000-0000" required>
                </div>

                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" name="email" placeholder="例：mail@example.com">
                </div>

                <div class="form-group">
                    <label for="type">お問い合わせ内容 <span class="required">必須</span></label>
                    <select id="type" name="type" required>
                        <option value="" disabled selected>選択してください</option>
                        <option value="体験・見学について">体験・見学について</option>
                        <option value="ご利用料金について">ご利用料金について</option>
                        <option value="その他">その他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">ご相談内容</label>
                    <textarea id="message" name="message" rows="6" placeholder="気になることや、ご本人様の現在の状況などをご自由にご記入ください。"></textarea>
                </div>

                <div class="form-submit">
                    <button type="submit" class="btn-submit">内容を確認して送信する</button>
                    <p class="submit-notes">※送信後、3営業日以内にご連絡いたします。</p>
                </div>
            </form>
            
            <div class="back-link">
                <a href="index.html" class="btn-back">← トップページに戻る</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2021 デイケア西高松在宅</p>
        </div>
    </footer>

</body>
</html>
